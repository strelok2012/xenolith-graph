name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@xenolith/playground' --filter '!@xenolith/site' run build
      - run: pnpm -r --filter '!@xenolith/playground' --filter '!@xenolith/site' run test
      - name: Install Playwright browsers (chromium + firefox)
        run: pnpm --filter @xenolith/playground exec playwright install --with-deps chromium firefox
      - name: E2E tests (skip @visual — Linux/macOS pixel diffs)
        run: pnpm --filter @xenolith/playground exec playwright test --grep-invert @visual

  build-site:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build every workspace dep the site imports (e.g. `@xenolith/mcp-server` consumed via
      # the TOOLS catalog endpoints). Without this the Astro/Vite build can't resolve `dist/index.js`
      # because the dep was never compiled — workspace links require `tsc -b` to materialise dist.
      - run: pnpm -r --filter '!@xenolith/playground' --filter '!@xenolith/site' run build
      - run: pnpm --filter @xenolith/site run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
