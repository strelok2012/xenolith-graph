name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@xenolith/playground' --filter '!@xenolith/site' run build
      - run: pnpm -r --filter '!@xenolith/playground' --filter '!@xenolith/site' run test
      - name: Install Playwright Chromium
        run: pnpm --filter @xenolith/playground exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm --filter @xenolith/playground exec playwright test

  build-site:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @xenolith/site run build
      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: apps/site/dist
